name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare data
        run: node scripts/prepare-data.mjs

      - name: Verify generated site data
        run: npm run check-generated

      - name: Stage static files
        run: |
          mkdir -p dist
          cp *.html dist/
          cp -R assets dist/assets
          cp -R data dist/data

      - name: Stamp deployed data metadata
        run: node scripts/stamp-site-meta.mjs --commit "$GITHUB_SHA" --file dist/data/site/meta.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
