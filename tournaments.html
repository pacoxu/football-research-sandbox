      <main>

          <div class="hero-copy">
            <p class="eyebrow" data-i18n="tournaments.hero.eyebrow">Tournament Directory</p>
            <h1 data-i18n="tournaments.hero.title">赛事列表</h1>

            <div id="tournamentLevelTabs" class="tab-row"></div>

            <div>
              <p class="eyebrow" data-i18n="tournaments.archive.eyebrow">Archive</p>
